name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build zip
        run: |
          mkdir -p bone_remapper
          cp __init__.py remapper.py bone_remapper/
          zip -r bone_remapper.zip bone_remapper/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Weight Remapper v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Weight Remapper ${{ github.ref_name }}

            ### Install
            1. Download `bone_remapper.zip` below
            2. Blender → Edit → Preferences → Add-ons → Install
            3. Select the zip and enable **Weight Remapper**

            Requires Blender 4.5+
          files: |
            bone_remapper.zip
            export_hierarchy.py
          fail_on_unmatched_files: true
